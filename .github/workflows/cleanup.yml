name: Cleanup workflow runs

on:
  workflow_run:
    workflows: ["Check and Sync HaGeZi to ControlD"]
    types: [completed]
  schedule:
    - cron: '19 4 1 * *'
  workflow_dispatch:
    inputs:
      force_delete_all:
        description: 'Force delete ALL runs (the latest run of each workflow is still kept)'
        type: boolean
        required: false
        default: false

permissions:
  actions: write

concurrency:
  group: cleanup-runs
  cancel-in-progress: false

jobs:
  delete-logs:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'schedule'
    steps:
      - name: Delete logs for the completed run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/logs

  delete-runs:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run'
    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event || '' }}
          FORCE: ${{ inputs.force_delete_all }}
          MAX_RUNS: 100
          MAX_AGE_DAYS: 30
        run: |
          cutoff=$(date -u -d "$MAX_AGE_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)

          # Fetch all completed runs with retry logic for transient API errors
          fetch_runs() {
            local attempt max_attempts=3 delay=5
            for (( attempt=1; attempt<=max_attempts; attempt++ )); do
              if output=$(gh api --paginate "/repos/$REPO/actions/runs?status=completed&per_page=100" \
                    --jq '.workflow_runs[] | "\(.created_at)\t\(.id)\t\(.workflow_id)\t\(.name)"' 2>&1); then
                echo "$output"
                return 0
              fi
              echo "::warning::API fetch attempt $attempt/$max_attempts failed: $output" >&2
              if (( attempt < max_attempts )); then
                sleep "$delay"
                delay=$(( delay * 2 ))
              fi
            done
            echo "::error::Failed to fetch workflow runs after $max_attempts attempts" >&2
            return 1
          }

          mapfile -t runs < <(fetch_runs | sort -r)
          if [[ ${#runs[@]} -eq 0 ]]; then
            echo "No completed runs found (or API error). Exiting."
            exit 0
          fi
          echo "Found ${#runs[@]} completed run(s); mode: $EVENT, trigger: ${TRIGGER_EVENT:-n/a}, force: ${FORCE:-false}"

          # Determine cleanup mode based on trigger
          # - schedule: age-based cleanup (delete runs older than MAX_AGE_DAYS)
          # - workflow_run (any conclusion): MAX_RUNS cleanup (keep latest MAX_RUNS per workflow)
          # - workflow_dispatch: both age-based and MAX_RUNS cleanup
          # Note: On workflow_run triggers, we always run cleanup regardless of conclusion
          #       (success or failure). Failed runs are only deleted if older than MAX_AGE_DAYS.
          age_cleanup=false
          max_runs_cleanup=false
          if [[ "$EVENT" == "schedule" ]]; then
            age_cleanup=true
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            age_cleanup=true
            max_runs_cleanup=true
          elif [[ "$EVENT" == "workflow_run" && "$TRIGGER_EVENT" == "schedule" ]]; then
            age_cleanup=true
          elif [[ "$EVENT" == "workflow_run" ]]; then
            # Any sync completion (success or failure) - apply MAX_RUNS cap
            # Failed runs older than MAX_AGE_DAYS are also deleted via age_cleanup
            max_runs_cleanup=true
            # Also enable age-based cleanup on workflow_run to catch failed runs older than 30 days
            age_cleanup=true
          fi

          # Fetch detailed run info to check conclusion (success/failure)
          # We need this to protect failed runs from MAX_RUNS cleanup
          declare -A run_conclusions
          if [[ "$max_runs_cleanup" == "true" ]]; then
            while IFS=$'\t' read -r created id wf name; do
              [[ -z "$id" ]] && continue
              conclusion=$(gh api "/repos/$REPO/actions/runs/$id" --jq '.conclusion // "unknown"' 2>/dev/null || echo "unknown")
              run_conclusions[$id]="$conclusion"
            done < <(printf '%s\n' "${runs[@]}")
          fi

          declare -A seen
          deleted=0
          for line in "${runs[@]}"; do
            IFS=$'\t' read -r created id wf name <<< "$line"

            # Skip empty/malformed lines
            if [[ -z "$id" || -z "$wf" ]]; then
              continue
            fi

            seen[$wf]=$(( ${seen[$wf]:-0} + 1 ))

            # The newest run of each workflow always survives
            if [[ ${seen[$wf]} -eq 1 ]]; then
              continue
            fi

            delete=false
            if [[ "$FORCE" == "true" ]]; then
              delete=true
            elif [[ "$max_runs_cleanup" == "true" && ${seen[$wf]} -gt $MAX_RUNS ]]; then
              # On workflow_run triggers, don't delete failed runs via MAX_RUNS
              # Failed runs are only cleaned up via age-based cleanup (older than 30 days)
              if [[ "$EVENT" == "workflow_run" && "${run_conclusions[$id]}" != "success" ]]; then
                # Skip MAX_RUNS deletion for failed runs, but still allow age-based deletion
                :
              else
                delete=true
              fi
            elif [[ "$age_cleanup" == "true" && "$created" < "$cutoff" ]]; then
              delete=true
            fi

            if [[ "$delete" == "true" ]]; then
              if gh api --silent --method DELETE "/repos/$REPO/actions/runs/$id"; then
                echo "Deleted run $id ($name, $created)"
                deleted=$(( deleted + 1 ))
              else
                echo "::warning::Failed to delete run $id ($name)"
              fi
            fi
          done

          echo "Deleted $deleted run(s)"
